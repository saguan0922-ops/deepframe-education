<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="theme-color" content="#080808">
  <title>DEEPFRAME | 교육영상</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <header class="hero">
    <nav class="nav wrap">
      <div class="brand">DEEPFRAME</div>
      <div class="nav-badge">PRIVATE TRAINING</div>
    </nav>

    <div class="hero-content wrap">
      <p class="kicker">INSTRUCTOR TRAINING · 2026</p>
      <h1>보안 교육영상<br>전용 페이지</h1>
      <p class="hero-copy">
        허가받은 시청자만 이용할 수 있습니다.<br>
        영상의 저장, 녹화, 재배포를 금지합니다.
      </p>
    </div>
  </header>

  <main class="wrap main">
    <section id="gate" class="gate" hidden>
      <p class="kicker">ACCESS REQUIRED</p>
      <h2>접속코드를 입력하세요</h2>
      <p>전달받은 공통 접속코드를 입력하면 강의 목록이 열립니다.</p>

      <form id="gate-form">
        <label class="sr-only" for="passcode">접속코드</label>
        <input id="passcode" type="password" autocomplete="current-password"
               placeholder="접속코드" maxlength="100" required>
        <button type="submit">입장하기</button>
      </form>
      <p id="gate-error" class="error" aria-live="polite"></p>
    </section>

    <section id="library" hidden>
      <div class="section-title">
        <div>
          <p class="kicker">COURSE LIBRARY</p>
          <h2>강의 목록</h2>
        </div>
        <button id="logout" class="outline-button" type="button">나가기</button>
      </div>

      <div id="course-grid" class="course-grid"></div>

      <p class="security-note">
        DRM은 직접 다운로드와 일반적인 녹화를 강하게 제한하지만,
        외부 카메라 촬영까지 막을 수는 없습니다.
      </p>
    </section>
  </main>

  <dialog id="player-dialog">
    <div class="dialog-head">
      <div>
        <small id="player-lesson">LESSON</small>
        <strong id="player-title">강의</strong>
      </div>
      <button id="player-close" type="button" aria-label="닫기">×</button>
    </div>
    <div id="player-area" class="player-area">
      <div class="loader"><span></span><p>보안 플레이어를 불러오는 중입니다…</p></div>
    </div>
  </dialog>

  <script src="/courses.js"></script>
  <script src="/app.js"></script>
</body>
</html>
